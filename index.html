<!DOCTYPE html><html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smoke</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #1f1f2e;
      color: white;
    }header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 30px;
  background-color: #2a2a3d;
}

header h1 {
  color: #c084fc;
}

nav button {
  margin-left: 10px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background-color: #444;
  color: white;
  cursor: pointer;
}

nav button:hover {
  background-color: #c084fc;
}

.container {
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 15px;
}

.card {
  background-color: #2a2a3d;
  padding: 15px;
  border-radius: 15px;
  text-align: center;
}

.card button {
  margin-top: 10px;
  padding: 8px;
  border: none;
  border-radius: 8px;
  background-color: #c084fc;
  cursor: pointer;
}

.hidden {
  display: none;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: none;
}

  </style>
</head>
<body><header>
  <h1>SMOKE</h1>
  <nav>
    <button onclick="showTab('store')">Loja</button>
    <button onclick="showTab('library')">Biblioteca</button>
    <button onclick="showTab('profile')">Perfil</button>
  </nav>
</header><div class="container">  <!-- Loja -->  <div id="store" class="tab">
    <div class="grid" id="storeGames"></div>
  </div>  <!-- Biblioteca -->  <div id="library" class="tab hidden">
    <div class="grid" id="libraryGames"></div>
  </div>  <!-- Perfil -->  <div id="profile" class="tab hidden">
    <h2>Editar Perfil</h2>
    <input type="text" id="username" value="Player1">
    <button onclick="saveProfile()">Salvar</button>
  </div></div><script>
  const games = ["Cyber Drift", "Shadow Quest", "Neon War", "Pixel Souls"];
  let library = ["Cyber Drift", "Shadow Quest"];

  function showTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.add('hidden'));
    document.getElementById(tab).classList.remove('hidden');
  }

  function renderStore() {
    const storeDiv = document.getElementById('storeGames');
    storeDiv.innerHTML = '';

    games.forEach(game => {
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `
        <h3>${game}</h3>
        <button onclick="buyGame('${game}')">Comprar</button>
      `;
      storeDiv.appendChild(div);
    });
  }

  function renderLibrary() {
    const libDiv = document.getElementById('libraryGames');
    libDiv.innerHTML = '';

    library.forEach(game => {
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `
        <h3>${game}</h3>
        <button>Jogar</button>
      `;
      libDiv.appendChild(div);
    });
  }

  function buyGame(game) {
    if (!library.includes(game)) {
      library.push(game);
      renderLibrary();
      alert('Jogo comprado!');
    }
  }

  function saveProfile() {
    const name = document.getElementById('username').value;
    alert('Perfil salvo como: ' + name);
  }

  renderStore();
  renderLibrary();
</script></body>
</html>
